# Inzi Display 백엔드 — Gunicorn 8001 + Nginx (444·6006 HTTPS, 80 ACME)
# SSL 경로는 /etc/nginx/snippets/inzi-display-ssl.conf (server-apply / issue-letsencrypt 가 생성)
#
# Let's Encrypt: sudo bash deploy/issue-inzi-letsencrypt.sh
# (공유기에서 외부 80 → 이 서버 포워딩 필요, HTTP-01)
#
# 외부: HTTPS 444·6006, Vercel은 vercel.json 으로 Gunicorn 6005 직결

upstream inzidisplay_gunicorn {
    server 127.0.0.1:8001;
    keepalive 32;
}

# certbot HTTP-01 / renew
server {
    listen 80;
    server_name inzi.duckdns.org uitsolutions.iptime.org;
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    location / {
        return 204;
    }
}

server {
    listen 444 ssl http2;
    listen 6006 ssl http2;
    server_name uitsolutions.iptime.org inzi.duckdns.org;

    include /etc/nginx/snippets/inzi-display-ssl.conf;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location /api/ {
        proxy_pass http://inzidisplay_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://inzidisplay_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }
}
