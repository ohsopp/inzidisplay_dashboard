# Inzi Display 백엔드 — SIMPAC/react_dashboard 의 deploy/nginx/backend-api.conf 패턴에 맞춤
# - SIMPAC: nginx 5006 등(5000번대) — 같은 PC 에서 Inzi 는 6000번대로 분리(공유기 포트포워딩과 동일)
# - 여기: Gunicorn 8001 + Nginx HTTPS — iptime(444) + DuckDNS/외부접속용(6006)
# - CORS 헤더는 nginx에 두지 않음(Flask flask-cors만 사용, SIMPAC README와 동일)
#
# 외부: HTTPS 444·6006 → Gunicorn 127.0.0.1:8001 (공유기: inzi-gunicorn 444, inzi-nginx 6006)
# Vercel은 Gunicorn 직결 포트(6005)로 보내는 것을 권장(vercel.json)
# DuckDNS: deploy/duckdns-update-inzi.example.sh · README "DuckDNS" 절 참고

upstream inzidisplay_gunicorn {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 444 ssl http2;
    listen 6006 ssl http2;
    server_name uitsolutions.iptime.org inzi.duckdns.org;

    # Let's Encrypt 실패 시(SERVFAIL 등): sudo bash deploy/server-apply-inzidisplay-nginx.sh 가 self-signed 생성
    # 운영 LE 성공 시 아래 두 줄로 교체:
    # ssl_certificate     /etc/letsencrypt/live/inzi.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/inzi.duckdns.org/privkey.pem;
    ssl_certificate     /etc/ssl/certs/inzi-duckdns.crt;
    ssl_certificate_key /etc/ssl/private/inzi-duckdns.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSE — SIMPAC simpac-api 의 location ~ ^/api/mqtt/ 와 동일 계열 (버퍼링 끔·긴 read_timeout)
    location ~ ^/api/events$ {
        proxy_pass http://inzidisplay_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding off;
        tcp_nodelay on;
    }

    location /api/ {
        proxy_pass http://inzidisplay_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://inzidisplay_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }
}
