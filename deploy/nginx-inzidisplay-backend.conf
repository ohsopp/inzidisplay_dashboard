# Inzi Display 백엔드 — SIMPAC/react_dashboard 의 deploy/nginx/backend-api.conf 패턴에 맞춤
# - react_dashboard: 127.0.0.1:8000 + nginx 5006(duckdns) — 여기서는 8001 + 444(iptime) 로 분리
# - CORS 헤더는 nginx에 두지 않음(Flask flask-cors만 사용, SIMPAC README와 동일)
#
# 외부: HTTPS 444 → Gunicorn 127.0.0.1:8001
# Vercel은 react_dashboard처럼 Gunicorn 직결 포트(6005)로 보내는 것을 권장(vercel.json)

upstream inzidisplay_gunicorn {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 444 ssl http2;
    server_name uitsolutions.iptime.org;

    # 운영: Let's Encrypt 발급 후 아래 두 줄로 교체하고 snakeoil 블록은 제거하세요.
    # ssl_certificate     /etc/letsencrypt/live/uitsolutions.iptime.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/uitsolutions.iptime.org/privkey.pem;
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location /api/ {
        proxy_pass http://inzidisplay_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://inzidisplay_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }
}
